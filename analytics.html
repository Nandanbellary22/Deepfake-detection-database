<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand fw-bold"
               href="/">

                <i class="fa-solid fa-chart-line"></i>

                Analytics Dashboard

            </a>

        </div>

    </nav>

    <!-- ANALYTICS SECTION -->

    <section class="dashboard-section">

        <div class="container">

            <h2 class="text-center mb-5">

                <i class="fa-solid fa-chart-pie"></i>

                Deepfake Analytics Overview

            </h2>

            <div class="row g-4">

                <!-- TOTAL REPORTS -->

                <div class="col-md-4">

                    <div class="card dashboard-card text-center">

                        <div class="card-body">

                            <i class="fa-solid fa-file-circle-exclamation fa-3x mb-3"></i>

                            <h3>{{ total_reports }}</h3>

                            <p>Total Reports</p>

                        </div>

                    </div>

                </div>

                <!-- FAKE REPORTS -->

                <div class="col-md-4">

                    <div class="card dashboard-card text-center">

                        <div class="card-body">

                            <i class="fa-solid fa-triangle-exclamation fa-3x mb-3"></i>

                            <h3>{{ fake_reports }}</h3>

                            <p>Fake Reports</p>

                        </div>

                    </div>

                </div>

                <!-- REAL REPORTS -->

                <div class="col-md-4">

                    <div class="card dashboard-card text-center">

                        <div class="card-body">

                            <i class="fa-solid fa-circle-check fa-3x mb-3"></i>

                            <h3>{{ real_reports }}</h3>

                            <p>Real Reports</p>

                        </div>

                    </div>

                </div>

                <!-- UNDER INVESTIGATION -->

                <div class="col-md-6">

                    <div class="card dashboard-card text-center">

                        <div class="card-body">

                            <i class="fa-solid fa-magnifying-glass fa-3x mb-3"></i>

                            <h3>{{ investigation_reports }}</h3>

                            <p>Under Investigation</p>

                        </div>

                    </div>

                </div>

                <!-- TOTAL USERS -->

                <div class="col-md-6">

                    <div class="card dashboard-card text-center">

                        <div class="card-body">

                            <i class="fa-solid fa-users fa-3x mb-3"></i>

                            <h3>{{ total_users }}</h3>

                            <p>Total Users</p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
