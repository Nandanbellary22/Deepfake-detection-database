<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <section class="form-container">

        <div class="form-card">

            <h2>

                <i class="fa-solid fa-user-plus"></i>

                Create Account

            </h2>

            <form action="/register"
                  method="POST">

                <!-- USERNAME -->

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <input type="text"
                           class="form-control"
                           name="username"
                           placeholder="Enter username"
                           required>

                </div>

                <!-- EMAIL -->

                <div class="mb-3">

                    <label class="form-label">

                        Email Address

                    </label>

                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="Enter email"
                           required>

                </div>

                <!-- PASSWORD -->

                <div class="mb-4">

                    <label class="form-label">

                        Password

                    </label>

                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Create password"
                           required>

                </div>

                <!-- BUTTON -->

                <button type="submit"
                        class="btn-submit">

                    Register

                </button>

            </form>

            <!-- LOGIN -->

            <div class="text-center mt-4">

                <p>

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
