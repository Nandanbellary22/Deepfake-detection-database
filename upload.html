<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Upload Report</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand fw-bold"
               href="/">

                <i class="fa-solid fa-shield-halved"></i>

                Deepfake Detection System

            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link"
                           href="/dashboard">

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="/upload">

                            Upload

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="/history">

                            History

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="/analytics">

                            Analytics

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="/">

                            Logout

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- UPLOAD SECTION -->

    <section class="dashboard-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="form-card">

                        <!-- SUCCESS MESSAGE -->

                        {% with messages = get_flashed_messages() %}

                            {% if messages %}

                                <div class="alert alert-success">

                                    {{ messages[0] }}

                                </div>

                            {% endif %}

                        {% endwith %}

                        <h2 class="mb-4 text-center">

                            <i class="fa-solid fa-cloud-arrow-up"></i>

                            Upload Suspicious Media

                        </h2>

                        <form action="/upload"
                              method="POST"
                              enctype="multipart/form-data">

                            <!-- TITLE -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Report Title

                                </label>

                                <input type="text"
                                       class="form-control"
                                       name="title"
                                       placeholder="Enter report title"
                                       required>

                            </div>

                            <!-- DESCRIPTION -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Description

                                </label>

                                <textarea class="form-control"
                                          rows="5"
                                          name="description"
                                          placeholder="Describe suspicious media"
                                          required></textarea>

                            </div>

                            <!-- MEDIA TYPE -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Media Type

                                </label>

                                <select class="form-select"
                                        name="media_type"
                                        required>

                                    <option value="">
                                        Select Media Type
                                    </option>

                                    <option value="Video">
                                        Video
                                    </option>

                                    <option value="Image">
                                        Image
                                    </option>

                                    <option value="Audio">
                                        Audio
                                    </option>

                                </select>

                            </div>

                            <!-- FILE UPLOAD -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Upload File

                                </label>

                                <input type="file"
                                       class="form-control"
                                       name="media_file"
                                       required>

                            </div>

                            <!-- BUTTON -->

                            <button type="submit"
                                    class="btn-submit">

                                Submit Report

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="container">

            <p class="mb-0">

                © 2026 Deepfake Detection Report System

            </p>

        </div>

    </footer>

    <!-- JS -->

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
